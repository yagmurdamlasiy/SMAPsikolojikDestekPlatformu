<section>
    <h2> Sen de Bir Not Bırak</h2><br><br><br>

    <style>
         /* Not ekleme alanı stili */
        .not-alan {
            width: 600px;
            margin: auto;
        }
        /* Not ekleme kutucuğu stili */
        textarea {
            width: 100%;
            height: 130px;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #aaa;
            border-radius: 8px;
            resize: vertical;
        }
        /* Bırakılan notların stili */
        .not {
            background: #f8f8f8;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            border: 1px solid #ddd;
        }
        /* Yıldız puanlama stili */
        .yildizlar span {
            font-size: 22px;
            cursor: pointer;
            color: #ccc;
        }
        /* içi dolu yıldız stili */
        .dolu {
            color: gold !important;
        }
    </style>
</head>

<div class="not-alan">
<img src="AnneÇocukSlider2.jpeg" width="75%" height="100%">
<br><br>
        
    <h2>Not Ekle</h2>
    <!-- Not ekleme kutucuğu -->
    <textarea id="notMetni"  placeholder="Sizde diğer aileler için güzel bir not bırakın..."></textarea>
    <br><br>
    <button onclick="notEkle()">Gönder</button>

    <h3 style="margin-top: 30px;">En Yeni Notlar</h3>

    <div id="notlarListesi"></div>

</div>

<script>
    /*  Notları yükleme */

    function notlariGetir() {
        let notlar = JSON.parse(localStorage.getItem("notlar") || "[]");

        /* En yeni not en üstte görünsün diye reverse ile tersine çevrilir */
        notlar.reverse();

        let liste = document.getElementById("notlarListesi");
        liste.innerHTML = "";

        notlar.forEach((not, index) => {
            let div = document.createElement("div");
            div.className = "not";

            div.innerHTML = `
                <p>${not.metin}</p>

                <div class="yildizlar">
                    ${yildizHTML(not.begen)}
                </div>
            `;

            /* Yıldızlara tıklanmasını sağlıyor */
            let yildizlar = div.getElementsByTagName("span");
            for (let i = 0; i < yildizlar.length; i++) {
                yildizlar[i].addEventListener("click", function () {
                    begeniVer(not.id, i + 1);
                });
            }
            /* bir elemanı baska eleman içine ekler*/
            liste.appendChild(div);
        });
    }


    /*  Not ekleme kısmı */

    function notEkle() {
        let metin = document.getElementById("notMetni").value;

        if (!metin.trim()) return alert("Not boş olamaz!");

        let notlar = JSON.parse(localStorage.getItem("notlar") || "[]");

        notlar.push({
            id: Date.now(),
            metin: metin,
            begen: 0
        });

        localStorage.setItem("notlar", JSON.stringify(notlar));

        document.getElementById("notMetni").value = "";
        notlariGetir();
    }


    /*  Yıldızla puanlama sistemi,*/

    function yildizHTML(sayi) {
        let html = "";
        for (let i = 1; i <= 5; i++) {
            html += `<span class="${i <= sayi ? 'dolu' : ''}">&#9733;</span>`;
        }
        return html;
    }

    function begeniVer(id, puan) {
        let notlar = JSON.parse(localStorage.getItem("notlar") || "[]");

        let hedef = notlar.find(n => n.id === id);
        if (hedef) hedef.begen = puan;

        localStorage.setItem("notlar", JSON.stringify(notlar));

        notlariGetir();
    }

    /* Sayfa açılınca yüklenen notları gösterir */
    notlariGetir();
</script>
